name: CI

on:
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run api:generate
      - run: bun run typecheck
      - run: bun test
      - name: Build CLI binary
        run: bun build packages/cli/src/index.ts --compile --outfile bunny
      - name: Build database-shell binary
        run: bun build packages/database-shell/src/cli.ts --compile --outfile bsql
